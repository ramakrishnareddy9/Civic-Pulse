version: '3.8'

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: civicpulse_postgres
    environment:
      POSTGRES_DB: civicpulse
      POSTGRES_USER: ${DB_USERNAME:-civicadmin}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-civicpass}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-civicadmin} -d civicpulse"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: civicpulse_redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
