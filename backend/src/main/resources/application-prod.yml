## Production Profile Configuration
## Usage: java -jar app.jar --spring.profiles.active=prod

spring:
  application:
    name: CivicPulse

  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/civicpulse}
    username: ${DATABASE_USER:civicpulse}
    password: ${DATABASE_PASSWORD:changeme}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000

  jpa:
    hibernate:
      ddl-auto: validate  # NEVER use update in production — use Flyway migrations
    properties:
      hibernate.format_sql: false
      hibernate.jdbc.batch_size: 50
      hibernate.order_inserts: true
      hibernate.order_updates: true
    show-sql: false
    open-in-view: false

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 5000ms
      lettuce:
        pool:
          max-active: 16
          max-idle: 8
          min-idle: 2

  ai:
    openai:
      api-key: ${OPENAI_API_KEY:}
      chat:
        options:
          model: gpt-4o-mini
          temperature: 0.2
      embedding:
        options:
          model: text-embedding-3-small
    vectorstore:
      pgvector:
        # PostgreSQL PgVector integration for Spring AI RAG
        # Requires: pgvector extension installed on PostgreSQL server
        # Docker image: pgvector/pgvector:pg16 (includes pgvector pre-installed)
        initialize-schema: true
        embedding-dimension: 1536
        index-type: ivfflat  # Use IVFFlat for faster similarity search on large datasets
        distance-type: cosine

  flyway:
    enabled: true
    baseline-on-migrate: true
    out-of-order: false
    locations: classpath:db/migration

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 15MB

  task:
    scheduling:
      pool:
        size: 5
        queue-capacity: 100

  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

  thymeleaf:
    prefix: classpath:/templates/
    suffix: .html
    cache: true

file:
  upload-dir: ${UPLOAD_DIR:./uploads}
  base-url: ${FILE_BASE_URL:https://civicpulse.example.com/static}

server:
  port: 8080
  shutdown: graceful
  servlet:
    session:
      timeout: 30m
    encoding:
      charset: UTF-8
      enabled: true
  error:
    include-message: always

jwt:
  secret: ${JWT_SECRET:}  # MUST be set in production environment (randomly generated, min 32 chars)
  expiration-ms: ${JWT_EXPIRATION_MS:86400000}
  refresh-expiration-ms: ${JWT_REFRESH_EXPIRATION_MS:604800000}

# CORS configuration
cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:https://civicpulse.example.com}
  allowed-methods: GET,POST,PUT,DELETE,OPTIONS,PATCH
  allowed-headers: '*'
  exposed-headers: Authorization,Content-Type
  allow-credentials: true
  max-age: 3600

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized
  server:
    port: 9090  # Separate actuator port for security

logging:
  level:
    com.civicpulse: INFO
    org.springframework.ai: WARN
    org.springframework.security: WARN
    org.flyway: INFO
  file:
    name: logs/civicpulse.log
    max-size: 10MB
    max-history: 30
    total-size-cap: 1GB
